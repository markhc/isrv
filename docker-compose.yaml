services:
  isrv:
    build: .
    container_name: isrv
    restart: unless-stopped
    user: "${UID}:${GID}"
    ports:
      - "8080:8080"
    environment:
      - UID=${UID}
      - GID=${GID}
      - TZ=UTC
      - LOG_LEVEL=info
    volumes:
      # Mount the configuration file
      - ./config.yaml:/config/config.yaml
      # Mount the data directory for uploads
      - ./data:/data/upload_data
    command: ["./isrv", "--disable-supervisor", "--config", "/config/config.yaml"]

