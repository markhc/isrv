<html>
<head>
    <title>isrv | Upload</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/upload.css">
</head>
<body>
    <div class="container">
        <h1>isrv | Upload</h1>
        
        <div id="upload-area" class="upload-area">
            <div class="upload-prompt">
                <p>Drop files here, paste from clipboard, or click to select</p>
                <input type="file" id="file-input" multiple>
            </div>
        </div>
        
        <div class="options">
            <label for="expires">Expires in days (optional):</label>
            <input type="number" id="expires" min="1" max="365" placeholder="auto">
        </div>
        
        <div id="file-list" class="file-list"></div>
        
        <div class="actions">
            <button id="upload-btn" disabled>Upload Files</button>
            <button id="clear-btn">Clear All</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script src="/static/upload.js"></script>
</body>
