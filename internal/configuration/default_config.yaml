# Default configuration for iSRV

# friendly name for the server, used in the HTML title and also in logs and responses
server_name: "iSRV"

# frontend url of the server, used for generating links in responses. Should include protocol and port if not default
server_url: http://localhost:8080

# host and port to listen on
server_host: 0.0.0.0
server_port: 8080

# maximum file size in megabytes for uploads
max_file_size_mb: 512

# minimum and maximum age of files in days before they are automatically deleted by the cleanup routine
# the minimum age can be overridden by a query parameter in the upload request, but the maximum age is fixed
min_age_days: 30
max_age_days: 365

# length of randomly generated file ids
random_id_length: 12

# Disables the index page that shows project information and help, among other things.
disable_index_page: false
# Disables the upload page that allows users to upload files through a web form.
disable_upload_page: true

# URL and format for the favicon. If empty, no favicon will be served.
# Can be a local file path or remote URL.
# The URL will be fetched and cached on startup. 
favicon_url: ""
favicon_format: "png"

# storage configuration
storage:
  # supported types: local, s3
  type: local
  # for local storage, this is the directory where files will be saved. For S3, this is the base path within the bucket (can be empty)
  base_path: ./upload_data/
  # for S3 storage, these are the required credentials and settings. For local storage, these can be left empty
  access_key: ""
  secret_key: ""
  bucket_name: ""
  region: ""
  endpoint: ""

database:
  # supported types: sqlite, postgres
  type: sqlite
  
  # for sqlite, this is the DSN (Data Source Name) which specifies the file path and options. 
  # for postgres, this can be a connection string or a set of parameters.
  #
  # when set, the DSN overrides all other database settings.
  dsn: file:isrv.db?cache=shared&mode=rwc

  # database file path for sqlite
  file_path: ""

  # connection parameters for postgres. These can be left empty if using sqlite or if the DSN is set.
  host: ""
  port: 0
  user: ""
  password: ""
  db_name: ""

# logging configuration
logging:
  level: info
  log_to_file: false
  path: ./isrv.log
  log_ips: true
  log_uploads: true

# cleanup configuration
cleanup:
  enabled: true
  interval: 1m

# enable debug mode for more verbose logging and additional information in responses
debug: false