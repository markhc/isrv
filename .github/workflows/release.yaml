name: Create Release on Tag Push
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Run tests
        run: make test
        
      - name: Build the project
        run: make build-all

  build_artifacts:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Get Release Version
        id: get_version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Building targets
        run: make build-all

      - name: Create tarball
        run: |
          tar -czvf isrv-linux-amd64.tar.gz -C build isrv-linux-amd64 && \
          tar -czvf isrv-linux-arm64.tar.gz -C build isrv-linux-arm64 && \
          tar -czvf isrv-darwin-amd64.tar.gz -C build isrv-darwin-amd64 && \
          tar -czvf isrv-darwin-arm64.tar.gz -C build isrv-darwin-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_VERSION }}
          name: Release ${{ steps.get_version.outputs.RELEASE_VERSION }}
          files: |
            isrv-linux-amd64.tar.gz
            isrv-linux-arm64.tar.gz
            isrv-darwin-amd64.tar.gz
            isrv-darwin-arm64.tar.gz
            
  docker_build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Release Version
        id: get_version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            markhc/isrv:latest
            markhc/isrv:${{ steps.get_version.outputs.RELEASE_VERSION }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          build-args: |
            BUILD_VERSION=${{ steps.get_version.outputs.RELEASE_VERSION }}
            BUILD_COMMIT=${{ github.sha }}