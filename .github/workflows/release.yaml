name: Create Release on Tag Push
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Run tests
        run: make test
        
      - name: Build the project
        run: make build-all

  build_artifacts:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Building targets
        run: make build-all

      - name: Create tarball
        run: |
          tar -czvf isrv-linux-amd64.tar.gz -C build isrv-linux-amd64 && \
          tar -czvf isrv-linux-arm64.tar.gz -C build isrv-linux-arm64 && \
          tar -czvf isrv-darwin-amd64.tar.gz -C build isrv-darwin-amd64 && \
          tar -czvf isrv-darwin-arm64.tar.gz -C build isrv-darwin-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          files: |
            isrv-linux-amd64.tar.gz
            isrv-linux-arm64.tar.gz
            isrv-darwin-amd64.tar.gz
            isrv-darwin-arm64.tar.gz